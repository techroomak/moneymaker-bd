<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MoneyMaker BD</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInAnonymously
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


/* ========= FIREBASE CONFIG ========= */
/* এখানে তোমার Firebase Config বসাবে */

const firebaseConfig = {

apiKey: "PASTE_API_KEY",
authDomain: "PASTE_AUTH_DOMAIN",
projectId: "PASTE_PROJECT_ID",
storageBucket: "PASTE_BUCKET",
messagingSenderId: "PASTE_SENDER_ID",
appId: "PASTE_APP_ID"

};


/* ========= FIREBASE ========= */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

await signInAnonymously(auth);


/* ========= TELEGRAM USER ========= */

let tg = window.Telegram.WebApp;

tg.expand();

const user = tg.initDataUnsafe.user || {};

const userId = user.id || "123456";

const username = user.username || "MoneyMaker User";

const photo = user.photo_url || "https://i.pravatar.cc/150";


/* ========= UI ========= */

document.getElementById("username").innerText = username;

document.getElementById("userid").innerText = userId;

document.getElementById("profile").src = photo;


/* ========= FIRESTORE ========= */

const userRef = doc(db, "users", String(userId));

const snap = await getDoc(userRef);

if (!snap.exists()) {

await setDoc(userRef, {

username: username,
coin: 0,
referral: 0,
created: Date.now()

});

}

const userData = (await getDoc(userRef)).data();

document.getElementById("coin").innerText = userData.coin;

document.getElementById("bdt").innerText =
(userData.coin / 10).toFixed(2);


/* ========= WATCH AD ========= */

window.claimCoin = async function(amount){

await updateDoc(userRef,{
coin: increment(amount)
});

location.reload();

};


/* ========= COPY LINK ========= */

window.copyInvite = function(){

const link =
`https://t.me/emoneymakebd_bot/app?startapp=${userId}`;

navigator.clipboard.writeText(link);

alert("Invite Link Copied");

};


/* ========= TIMER ========= */

function startTimer(){

let h = 23;
let m = 59;
let s = 59;

setInterval(()=>{

s--;

if(s < 0){
s = 59;
m--;
}

if(m < 0){
m = 59;
h--;
}

document.getElementById("timer").innerText =
`${h}:${m}:${s}`;

},1000);

}

startTimer();

</script>
