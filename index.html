<!-- ========================= -->
<!-- APP CONTAINER -->
<!-- ========================= -->

<div class="app-container">



  <!-- ========================= -->
  <!-- HEADER SECTION -->
  <!-- ========================= -->

  <header class="header-section">

    <div class="top-bar">

      <!-- PROFILE AREA -->

      <div class="profile-area">

        <img class="profile-image"/>

        <div class="profile-info">

          <div class="name-row">

            <h2 class="profile-name"></h2>

            <img class="verify-badge"/>

          </div>

          <p class="user-id-text"></p>

          <div class="earn-box">

            <img class="coin-logo"/>

            <div class="earn-info">

              <h3 class="coin-text"></h3>

              <p class="bdt-text"></p>

            </div>

          </div>

        </div>

      </div>

      <!-- HEADER ICONS -->

      <div class="header-icons">

        <div class="header-icon-box notification-box">

          <div class="notification-dot"></div>

          <img class="header-icon"/>

        </div>

        <div class="header-icon-box support-box">

          <img class="header-icon"/>

        </div>

        <div class="header-icon-box invite-box">

          <img class="header-icon"/>

        </div>

      </div>

    </div>

  </header>



  <!-- ========================= -->
  <!-- STATS SECTION -->
  <!-- ========================= -->

  <section class="stats-section">

    <div class="stats-card total-refer-card">

      <div class="stats-icon purple-bg">

        <img class="stats-icon-image"/>

      </div>

      <p class="stats-title"></p>

      <h2 class="stats-number"></h2>

    </div>



    <div class="stats-card daily-earn-card">

      <div class="stats-icon green-bg">

        <img class="stats-icon-image"/>

      </div>

      <p class="stats-title"></p>

      <h2 class="stats-number"></h2>

    </div>



    <div class="stats-card refer-earn-card">

      <div class="stats-icon orange-bg">

        <img class="stats-icon-image"/>

      </div>

      <p class="stats-title"></p>

      <h2 class="stats-number"></h2>

    </div>



    <div class="stats-card withdraw-card">

      <div class="stats-icon blue-bg">

        <img class="stats-icon-image"/>

      </div>

      <p class="stats-title"></p>

      <h2 class="stats-number"></h2>

    </div>

  </section>



  <!-- ========================= -->
  <!-- INVITE SECTION -->
  <!-- ========================= -->

  <section class="invite-section">

    <div class="invite-card">

      <div class="invite-left">

        <h2 class="invite-title"></h2>

        <p class="invite-bonus"></p>

        <div class="invite-link-box">

          <span class="invite-link-text"></span>

        </div>

      </div>

      <button class="copy-button"></button>

    </div>

  </section>



  <!-- ========================= -->
  <!-- ADS SECTION -->
  <!-- ========================= -->

  <section class="ads-section">

    <h2 class="section-title"></h2>

    <div class="ads-grid">



      <div class="ad-card">

        <div class="ad-info">

          <h3 class="ad-title"></h3>

          <p class="ad-description"></p>

        </div>

        <button class="claim-button">

          <img class="claim-coin-icon"/>

        </button>

      </div>



      <div class="ad-card"></div>

      <div class="ad-card"></div>

      <div class="ad-card"></div>

    </div>

  </section>



  <!-- ========================= -->
  <!-- DAILY TASK SECTION -->
  <!-- ========================= -->

  <section class="daily-task-section">

    <h2 class="section-title"></h2>

    <div class="task-card">

      <div class="task-info">

        <h3 class="task-title"></h3>

        <p class="task-description"></p>

      </div>

      <button class="task-button"></button>

      <div class="task-timer"></div>

    </div>

  </section>



  <!-- ========================= -->
  <!-- SOCIAL TASK SECTION -->
  <!-- ========================= -->

  <section class="social-task-section">

    <h2 class="section-title"></h2>

    <div class="social-list">



      <a class="social-item">

        <div class="social-left">

          <img class="social-icon"/>

          <span class="social-name"></span>

        </div>

        <button class="social-button"></button>

      </a>



    </div>

  </section>



  <!-- ========================= -->
  <!-- BOTTOM NAVIGATION -->
  <!-- ========================= -->

  <nav class="bottom-nav">

    <button class="nav-button home-button">

      <img class="nav-icon"/>

      <span class="nav-text"></span>

    </button>



    <button class="nav-button leaderboard-button">

      <img class="nav-icon"/>

      <span class="nav-text"></span>

    </button>



    <button class="nav-button withdraw-button">

      <img class="nav-icon"/>

      <span class="nav-text"></span>

    </button>

  </nav>



</div>
