<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyMaker BD</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background:#f5f7ff;
      font-family:sans-serif;
    }
  </style>
</head>

<body>

<div class="max-w-md mx-auto min-h-screen bg-white shadow-lg">

  <!-- Top Header -->

  <div class="bg-blue-600 text-white p-5 rounded-b-3xl">

    <div class="flex items-center gap-3">

      <img
        src="https://i.pravatar.cc/100"
        class="w-14 h-14 rounded-full border-2 border-white"
      >

      <div>
        <h2 class="font-bold text-lg">
          MoneyMaker User
        </h2>

        <p class="text-sm">
          ID: 123456789
        </p>
      </div>

    </div>

    <div class="mt-5 bg-white text-black rounded-2xl p-4">

      <h3 class="text-gray-500 text-sm">
        Total Earn
      </h3>

      <h1 class="text-3xl font-bold">
        5,250 Coin
      </h1>

      <p class="text-green-600 mt-1">
        ≈ 525 BDT
      </p>

    </div>

  </div>

  <!-- Invite Button -->

  <div class="p-4">

    <button
      class="w-full bg-green-500 text-white py-3 rounded-2xl font-bold"
    >
      Invite & Copy Link
    </button>

  </div>

  <!-- Watch & Earn -->

  <div class="px-4">

    <h2 class="font-bold text-lg mb-3">
      Watch & Earn Coin
    </h2>

    <div class="space-y-3">

      <button class="w-full bg-blue-500 text-white p-4 rounded-2xl">
        Watch Ad +5 Coin
      </button>

      <button class="w-full bg-purple-500 text-white p-4 rounded-2xl">
        Video Ad +10 Coin
      </button>

      <button class="w-full bg-orange-500 text-white p-4 rounded-2xl">
        Premium Ad +20 Coin
      </button>

    </div>

  </div>

  <!-- Social Tasks -->

  <div class="p-4">

    <h2 class="font-bold text-lg mb-3">
      Social Tasks
    </h2>

    <div class="space-y-3">

      <div class="bg-gray-100 p-4 rounded-2xl flex justify-between">
        <span>Facebook Follow</span>
        <span>+25</span>
      </div>

      <div class="bg-gray-100 p-4 rounded-2xl flex justify-between">
        <span>YouTube Subscribe</span>
        <span>+25</span>
      </div>

      <div class="bg-gray-100 p-4 rounded-2xl flex justify-between">
        <span>Instagram Follow</span>
        <span>+25</span>
      </div>

    </div>

  </div>

  <!-- Bottom Navigation -->

  <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t flex justify-around p-3">

    <button class="font-bold text-blue-600">
      Home
    </button>

    <button>
      Leaderboard
    </button>

    <button>
      Withdraw
    </button>

    <button>
      Support
    </button>

  </div>

</div>

</body>
</html>
