<!DOCTYPE html>
<html lang="en">

<link rel="stylesheet" href="css/style.css"/>

<body>

<!-- ========================= -->

<header class="header-section">

🏆 Leaderboard

<div class="leaderboard-list">

<!-- USER -->

<div class="leaderboard-item">

<div class="leaderboard-left">

/>

<div>

</div>

</div>

25000

</div>

<!-- USER -->
