<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Play & Earn</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="app-container">

<header class="header-section withdraw-header">

<div class="header-top">

<div class="profile-box">

<h2 class="profile-name">
🎮 Play & Earn
</h2>

</div>

</div>

</header>

<!-- ========================= -->
<!-- FEATURED GAME -->
<!-- ========================= -->

<section class="play-featured-section">

<div id="featuredGameCard" class="featured-card">

<div class="featured-content">

<div class="featured-badge">

🔥 Featured Game

</div>

<h2 id="featuredGameTitle">

Space Shooter

</h2>

<p id="featuredGameDescription">

Fight enemies and earn exciting rewards.

</p>

<div class="featured-bottom">

<div class="featured-reward">

<img
class="mini-coin-icon"
src="https://cdn-icons-png.flaticon.com/128/11280/11280638.png"
/>

<span id="featuredGameReward">

500 Coin

</span>

</div>

<button
id="featuredPlayBtn"
class="featured-play-btn"
>

Play Now

</button>

</div>

</div>

<div class="featured-image">

<img
id="featuredGameLogo"
src="https://cdn-icons-png.flaticon.com/512/686/686589.png"
>

</div>

</div>

</section>

<!-- ========================= -->
<!-- GAME STATISTICS -->
<!-- ========================= -->

<section class="play-stats-section">

<div class="play-stats-card">

<div class="play-stat-box">

<div class="play-stat-title">
Completed
</div>

<div
id="totalCompletedGames"
class="play-stat-value"
>
0
</div>

</div>

<div class="play-stat-divider"></div>

<div class="play-stat-box">

<div class="play-stat-title">
Reward
</div>

<div
id="totalGameReward"
class="play-stat-value"
>
0
</div>

</div>

<div class="play-stat-divider"></div>

<div class="play-stat-box">

<div class="play-stat-title">
Today
</div>

<div
id="todayCompletedGames"
class="play-stat-value"
>
0/10
</div>

</div>

</div>

</section>

<!-- ========================= -->
<!-- GAME LIST -->
<!-- ========================= -->

<section class="play-games-section">

<div class="section-title">

🎮 Instant Games

</div>

<div id="gameList">

<div class="game-card">

<div class="game-left">

<img
class="game-logo"
src="https://cdn-icons-png.flaticon.com/512/686/686589.png"
>

<div class="game-info">

<div class="game-title-row">

<h3 class="game-title">

Puzzle Master

</h3>

<span class="game-status">

Available

</span>

</div>

<p class="game-description">

Complete puzzle levels and earn exciting rewards.

</p>

<div class="game-meta">

<div class="game-reward">

<img
class="mini-coin-icon"
src="https://cdn-icons-png.flaticon.com/128/11280/11280638.png"
>

500 Coin

</div>

<div class="game-complete">

🏆 2,543 Players

</div>

</div>

</div>

</div>

<button class="game-play-btn">

Play

</button>

</div>

</div>

</section>

<!-- ========================= -->
<!-- RULES -->
<!-- ========================= -->

<section class="play-rules-section">

<div class="play-rules-card">

<h3>

📋 Rules

</h3>

<ul id="playRules">

<li>Loading...</li>

</ul>

</div>

</section>

<!-- ========================= -->
<!-- OFFERWALL -->
<!-- ========================= -->

<section class="play-offer-section">

<div class="play-offer-card">

<div class="play-offer-icon">

🎁

</div>

<div>

<h3>

Offerwall

</h3>

<p>

Coming Soon

</p>

</div>

</div>

</section>

</div>

</body>

</html>
