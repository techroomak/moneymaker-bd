<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>My Team</title>

<link rel="stylesheet" href="css/style.css"/>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
     
<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="app-container">
     
        <!-- HEADER -->
<header class="header-section">

<div class="header-top">

<h2 class="profile-name">
<img
class="nav-icon" style="width: 25px; margin: 0 0 0 15px;"
src="https://cdn-icons-png.flaticon.com/128/681/681494.png"
/> My Team
</h2>

</div>

</header>
  
<!-- TEAM TOP CARD -->

<section class="team-top-section">

<div class="team-top-card">

<div class="team-box">

<div class="team-label">
Available Bonus
</div>

<div class="team-value">
<span id="teamBonus">0</span>
</div>

<button
id="claimTeamBonusBtn"
class="team-claim-btn"
onclick="claimTeamBonus()"
>
Loading...
</button>

</div>

<div class="team-divider"></div>

<div class="team-box">

<div class="team-label">
Total Bonus Earned
</div>

<div class="team-value">
<span id="totalTeamBonus">0</span>
</div>

</div>

</div>

</section>

<!-- TEAM STATS -->

<section class="team-stat-section">

<div class="team-stat-card">

<div class="team-stat-item">

<div class="team-stat-title">
Total Refer
</div>

<div
id="teamTotalRefer2"
class="team-stat-value"
>
0
</div>

</div>

<div class="team-stat-item">

<div class="team-stat-title">
Active Refer
</div>

<div
id="teamActiveRefer"
class="team-stat-value"
>
0
</div>

</div>

</div>

</section>

<!-- TABLE -->

<section class="team-table-section">

<div class="team-table-header">

<div>User</div>

<div>Daily Bonus</div>

<div>daily</div>

<div>Total</div>

<div>Status</div>

</div>
  
<div id="teamList">

<div class="team-loading">
Loading...
</div>

</div>

</section>
  
<!-- BOTTOM NAV -->

<nav class="bottom-nav">

<button
class="nav-item"
onclick="window.location.href='index.html'"
>

<img
class="nav-icon"
src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png"
/>

<span class="nav-text">
Home
</span>

</button>

<button
class="nav-item active-nav"
onclick="window.location.href='team.html'"
>

<img
class="nav-icon"
src="https://cdn-icons-png.flaticon.com/128/681/681494.png"
/>

<span class="nav-text">
My Team
</span>

</button>

<button
class="nav-item"
onclick="window.location.href='leaderboard.html'"
>

<img
class="nav-icon"
src="https://cdn-icons-png.flaticon.com/128/3713/3713857.png"
/>

<span class="nav-text">
Leaderboard
</span>

</button>

<button
class="nav-item"
onclick="window.location.href='withdraw.html'"
>

<img
class="nav-icon"
src="https://cdn-icons-png.flaticon.com/128/2527/2527572.png"
/>

<span class="nav-text">
Wallet
</span>

</button>

</nav>
