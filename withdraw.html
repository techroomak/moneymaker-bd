<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Withdraw</title>

<link rel="stylesheet" href="css/style.css"/>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="app-container">

<!-- ========================= -->
<!-- HEADER -->
<!-- ========================= -->

<header class="header-section">

<div class="header-top">

<h2 class="profile-name">
   💳
 Withdraw
</h2>

</div>

</header>

<!-- ========================= -->
<!-- WITHDRAW FORM -->
<!-- ========================= -->

<section class="withdraw-section">

<div class="withdraw-card">

<!-- METHOD -->

<div class="withdraw-balance-card">

<div class="balance-label">
Current Balance
</div>

<div class="balance-content">

<div class="balance-left">

<div class="balance-row">

<img
class="balance-coin-icon"
src="https://cdn-icons-png.flaticon.com/128/3258/3258446.png"
>

<div>

<div
id="withdrawBalance"
class="balance-value"
>
0
</div>

<div
id="withdrawBalanceBdt"
class="balance-bdt"
>
৳0.00
</div>

</div>

</div>

</div>

<div class="balance-right">

<img
class="withdraw-moneybag"
src="https://png.pngtree.com/png-vector/20241217/ourmid/pngtree-clipart-of-a-money-bag-filled-with-gold-coins-featuring-dollar-png-image_14789520.png"
>

</div>

</div>

</div>
   
<label class="withdraw-label">
Select Payment Method
</label>

<div class="method-grid">

<div
class="method-card"
onclick="selectMethod('bkash',this)"
>

<img
src="https://download.logo.wine/logo/BKash/BKash-Icon-Logo.wine.png"
>

<span>bKash</span>

</div>

<div
class="method-card"
onclick="selectMethod('nagad',this)"
>

<img
src="https://download.logo.wine/logo/Nagad/Nagad-Vertical-Logo.wine.png"
>

<span>Nagad</span>

</div>

<div
class="method-card"
onclick="selectMethod('recharge',this)"
>

<img class="recharge-logo"
src="https://cdn-icons-png.flaticon.com/128/1936/1936112.png"
>

<span>Recharge</span>

</div>

</div>

<input
type="hidden"
id="paymentMethod"
/>

<!-- NAME -->

<label class="withdraw-label">
Account Name
</label>

<input
id="accountName"
class="withdraw-input"
type="text"
placeholder="Enter account name"
/>

<!-- NUMBER -->

<label class="withdraw-label">
Account Number
</label>

<input
id="accountNumber"
class="withdraw-input"
type="number"
placeholder="01XXXXXXXXX"
/>

<!-- AMOUNT -->

<label class="withdraw-label">
Amount ৳
</label>

<input
id="withdrawAmount"
class="withdraw-input"
type="number"
placeholder="Enter TAKA"
oninput="checkWithdrawAmount()"
/>

<!-- ALERT -->

<p
id="withdrawInfo"
class="withdraw-alert"
style="display:none;"
>
</p>

<!-- COIN -->

<p
id="withdrawInfo"
class="withdraw-alert"
style="display:none;"
>
</p>

<p
id="coinConvert"
class="coin-convert"
style="display:none;"
>
</p>
<p
id="withdrawLimit"
class="withdraw-limit"
style="display:none;"
>
</p>
<!-- LIMIT -->

<p
id="withdrawLimit"
class="withdraw-limit"
style="display:none;"
>
</p>

<!-- BUTTON -->

<button
id="withdrawButton"
class="withdraw-button"
onclick="submitWithdraw()"
>
Request Withdraw
</button>
</div>

</section>

<!-- ========================= -->
<!-- HISTORY -->
<!-- ========================= -->

<section class="withdraw-history-section">

<h2 class="section-title">
Transaction History
</h2>

<div id="historyList" class="history-list">
</div>
<!-- HISTORY ITEM -->


</section>

<!-- ========================= -->
<!-- BOTTOM NAV -->
<!-- ========================= -->

<nav class="bottom-nav">

<button
class="nav-item"
onclick="window.location.href='index.html'"
>

<img
class="nav-icon"
src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png"
/>

<span class="nav-text">
Home
</span>

</button>

<button
class="nav-item"
onclick="window.location.href='leaderboard.html'"
>

<img
class="nav-icon"
src="https://cdn-icons-png.flaticon.com/128/3713/3713857.png"
/>

<span class="nav-text">
Leaderboard
</span>

</button>

<button
class="nav-item active-nav"
onclick="window.location.href='withdraw.html'"
>

<img
class="nav-icon"
src="https://cdn-icons-png.flaticon.com/128/7710/7710772.png"
/>

<span class="nav-text">
Withdraw
</span>

</button>

</nav>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
