<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Withdraw</title>

<link rel="stylesheet" href="css/style.css"/>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="app-container">

<!-- ========================= -->
<!-- HEADER -->
<!-- ========================= -->

<header class="header-section">

<div class="header-top">

<h2 class="profile-name">
   💳
 Withdraw
</h2>

</div>

</header>

<!-- ========================= -->
<!-- WITHDRAW FORM -->
<!-- ========================= -->

<section class="withdraw-section">

<div class="withdraw-card">

<!-- METHOD -->

<label class="withdraw-label">
Cash Out Method
</label>

<select
id="paymentMethod"
class="withdraw-input"
onchange="changeWithdrawInfo()"
>
<option value="">
Select Bank
</option>
<option value="bkash">
bKash
</option>

<option value="nagad">
Nagad
</option>

<option value="recharge">
Mobile Recharge
</option>

</select>

<!-- NAME -->

<label class="withdraw-label">
Account Name
</label>

<input
id="accountName"
class="withdraw-input"
type="text"
placeholder="Enter account name"
/>

<!-- NUMBER -->

<label class="withdraw-label">
Account Number
</label>

<input
id="accountNumber"
class="withdraw-input"
type="number"
placeholder="01XXXXXXXXX"
/>

<!-- AMOUNT -->

<label class="withdraw-label">
Amount
</label>

<input
id="withdrawAmount"
class="withdraw-input"
type="number"
placeholder="Enter amount"
oninput="checkWithdrawAmount()"
/>

<!-- ALERT -->

<p
id="withdrawInfo"
class="withdraw-alert"
>

Minimum 500Tk • Maximum 1000Tk

</p>

<!-- COIN -->

<p
id="withdrawInfo"
class="withdraw-alert"
style="display:none;"
>
</p>

<p
id="coinConvert"
class="coin-convert"
style="display:none;"
>
</p>

<!-- LIMIT -->

<p
id="withdrawLimit"
class="withdraw-limit"
>

Daily Withdraw Limit: 3 Times

</p>

<!-- BUTTON -->

<button class="withdraw-button">
Request Withdraw
</button>

</div>

</section>

<!-- ========================= -->
<!-- HISTORY -->
<!-- ========================= -->

<section class="withdraw-history-section">

<h2 class="section-title">
Transaction History
</h2>

<div class="history-list">

<!-- HISTORY ITEM -->

<div class="history-item">

<div class="history-left">

<div class="history-method">

<img
class="history-method-icon"
src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png"
/>

<span>
bKash
</span>

</div>

<h3 class="history-title">
01XXXXXXXXX
</h3>

<p class="history-date">
20 May 2026 • 11:42 PM
</p>

</div>

<div class="history-right">

<div class="history-amount">
500Tk
</div>

<div class="history-status pending-status">
Pending
</div>

</div>

</div>

<!-- HISTORY ITEM -->

<div class="history-item">

<div class="history-left">

<div class="history-method">

<img
class="history-method-icon"
src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png"
/>

<span>
Nagad
</span>

</div>

<h3 class="history-title">
01XXXXXXXXX
</h3>

<p class="history-date">
19 May 2026 • 09:15 PM
</p>

</div>

<div class="history-right">

<div class="history-amount">
1000Tk
</div>

<div class="history-status success-status">
Success
</div>

</div>

</div>

</div>

</section>

<!-- ========================= -->
<!-- BOTTOM NAV -->
<!-- ========================= -->

<nav class="bottom-nav">

<button
class="nav-item"
onclick="window.location.href='index.html'"
>

<img
class="nav-icon"
src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png"
/>

<span class="nav-text">
Home
</span>

</button>

<button
class="nav-item"
onclick="window.location.href='leaderboard.html'"
>

<img
class="nav-icon"
src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png"
/>

<span class="nav-text">
Leaderboard
</span>

</button>

<button
class="nav-item active-nav"
onclick="window.location.href='withdraw.html'"
>

<img
class="nav-icon"
src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png"
/>

<span class="nav-text">
Withdraw
</span>

</button>

</nav>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
